const CATEGORIES = {

const SHORT_NAMES = { "SERIES":"SERIES", "PILOT — LOCKED":"LOCKED", "PILOT — PROPOSED":"PROPOSED", "PILOT — SHOT DOWN":"SHOT DOWN", "EP2 — HUSTLES":"EP2", "EP3 — ELARA":"EP3", "EP4 — BUY NOW DIE LATER":"EP4", "EP5 — SASHA":"EP5", "PRODUCTION":"PROD", "COMEDY RULES":"COMEDY", "NEW":"NEW" };

const STORAGE_KEY = "dcb_whiteboard_state";

// Same INITIAL_IDEAS as desktop (abbreviated — loads from localStorage in practice)
const INITIAL_IDEAS = [
  { id: 1, cat: "SERIES", text: "5-episode hybrid anthology, Amsterdam. Working poor met een MacBook. Educated, financially precarious. Baton-pass structure — last frame of each ep introduces next protagonist.", pinned: true },
  { id: 6, cat: "SERIES", text: "Ep1 (Edoardo) and Ep5 (Sasha) function as bookends. He can't monetise himself. She is monetised against her will. He gets fined at the gate. She walks away free." },
  { id: 2, cat: "SERIES", text: "Visual language degrades across series. Ep1 crisp. By Ep5 compression artefacts, glitches, image rotting. Vaporwave becomes weirdcore.", pinned: true },
  { id: 3, cat: "SERIES", text: "Three visual registers: Desktop Cinema (screen as narrative space), Videogame Sequences (RPG/visual novel — different per episode), Vaporwave Aesthetic (cyan/magenta/Memphis Design)." },
  { id: 10, cat: "SERIES", text: "Simlish audio for all visual novel/RPG sequences. Content through text boxes. You have to READ." },
  { id: 7, cat: "SERIES", text: "Comps: Atlanta (surreal played straight), Ramy (cultural specificity without explanation), Chungking Express (consumer products as emotional objects), Mr. Robot (desktop cinema)." },
  { id: 9, cat: "SERIES", text: "Tone: comedy register is mo lei tau — dead serious commitment to absurd premises, no winking. Combined with Italian humiliation economics and manzai boke/tsukkomi." },
  { id: 4, cat: "SERIES", text: "\"Describe the room, not the wallpaper.\" Specific character behaviour under pressure, not abstract statements about late capitalism." },
  { id: 5, cat: "SERIES", text: "\"If you want politics go to the Hague or go vote, I tell stories.\" No framing through political/theoretical lenses." },
  { id: 8, cat: "SERIES", text: "Audience: Zillennials (1993-1998) and older Gen Z. People who check their bank balance with one eye closed." },
  { id: 11, cat: "SERIES", text: "Origin: 2021 experimental short \"Reflections on Dutch Capitalism\" — 7min33s, all roles solo, Willem de Kooning Academy. Led to Fabrica and UdK Berlin." },
  { id: 150, cat: "COMEDY RULES", text: "Mo lei tau: total commitment to absurd premises. No winking. Gap between sincerity and recognition IS the comedy." },
  { id: 300, cat: "COMEDY RULES", text: "MO LEI TAU AS ENGINE: The comedy operates on hyper-specific absurdism and the mundane accumulation of chaos. It is not dark, dramatic, or melancholic. It is a picaresque stream where the surrealism is accepted as reality." },
  { id: 152, cat: "COMEDY RULES", text: "Three registers: protagonist = mo lei tau (commitment), camera = Italian (detached), chat = manzai (correction)." },
  { id: 151, cat: "COMEDY RULES", text: "Chat as distributed tsukkomi: COMPLETES the joke. Writing must leave structural gap where tsukkomi belongs." },
  { id: 153, cat: "COMEDY RULES", text: "Dignity preserved through earnestness. Ganbare tradition. Laugh is with, not at." },
  { id: 154, cat: "COMEDY RULES", text: "Pirandello bifocal: avvertimento (laughing at) → sentimento (laughing with through compassion)." },
  { id: 158, cat: "COMEDY RULES", text: "Bella figura: dignity PERFORMED while crumbling. They know. They keep performing." },
  { id: 156, cat: "COMEDY RULES", text: "Yoshida: \"When a human being is earnest about something, there's something humorous about that.\"" },
  { id: 155, cat: "COMEDY RULES", text: "Summarising a joke KILLS IT. Commit. Don't observe." },
  { id: 157, cat: "COMEDY RULES", text: "Comedy and pathos in same frame. NOT sequenced. Simultaneity." },
  { id: 219, cat: "COMEDY RULES", text: "SPENDING MECHANIC PRINCIPLE: A slope, not a repeating gag. The dam-break structure means the FIRST payment arriving is the trigger — then queued automated payments fire in machine-gun sequence. Comedy from the speed differential between human-paced decisions and system-paced consequences. Not \"oh no another bill\" four times — one cascade that feels like a system failure." },
  { id: 20, cat: "PILOT — LOCKED", text: "Logline: Political livestreamer with 65 viewers picks up package in centre, gets high, goes viral by accident, spends money he doesn't have, ends stuck at metro gate with declined card.", pinned: true },
  { id: 21, cat: "PILOT — LOCKED", text: "Edoardo: Italian expat, late 20s. Aspirationally Žižek. Read Cassirer, Benjamin, Adorno — can't land the tone. 65-70 regulars. Private Discord ~15 active. Stream NOT monetised (yet)." },
  { id: 200, cat: "PILOT — LOCKED", text: "BESPOKE RANTS AS FREE SERVICE: Edoardo performs personalised anti-corporate rants on request for his chat. A bespoke service he has NEVER monetised. He does it for love and intellectual pride. The fact that it's free is not a gag — it's the foundation of the entire spending crisis. He gives away the one thing people would actually pay for." },
  { id: 37, cat: "PILOT — LOCKED", text: "VIEWER COUNT AS DRAMATIC ENGINE: High counts → delusional overcommitment. Low counts → evidence of those commitments left in his hands (bags, pitch deck, Bonus Card)." },
  { id: 38, cat: "PILOT — LOCKED", text: "Episode reads as if Edoardo edited it himself. When the visual language breaks down at the metro gate — the show takes over from his version of himself." },
  { id: 307, cat: "PILOT — LOCKED", text: "THE VILLAGE (65 VIEWERS): The baseline stream is a bucolic, chill environment. Regulars use him for background noise. He operates as a \"Jukebox of Rage\" — taking custom requests from viewers to philosophically destroy the specific companies they are currently working for." },
  { id: 22, cat: "PILOT — LOCKED", text: "Opens streaming to regulars, showing his own 2021 video. \"I was ahead of my time.\" Chat: \"bro we watched this a year ago.\" Doorbell — missed delivery. Rants about delivery person, apologises to working class." },
  { id: 308, cat: "PILOT — LOCKED", text: "LORE-KEEPERS AS STOCK HOLDERS: Two users treat his stream like an archive. Track absurd continuity details of outfits and past streams. They are \"streamer hunters\" who hold his stock early; when he finally goes viral, they don't try to save him — they just enjoy the beautiful explosion of his dignity." },
  { id: 28, cat: "PILOT — LOCKED", text: "TWO CHAT REGULARS: Unauthorized archivists of his life. Correct him about his OWN history. \"four years bro, you always forget the first winter.\" More reliable narrators of him than he is." },
  { id: 23, cat: "PILOT — LOCKED", text: "Chat pushes him outside: \"Bro just go get it yourself and stream it.\" They've seen him return high and loose before. Slight devilish intent — they want the funny version. He hears \"we want more of you.\"" },
  { id: 210, cat: "PILOT — LOCKED", text: "€85 THEORY BOOK AS DEAD WEIGHT: He picks up the package — the thing that started the whole IRL stream. It's an €85 theory book he ordered that morning. \"Very important.\" From this point on he carries it as literal dead weight through every remaining scene. Bags in one hand, book in the other. The intellectual purchase that caused the journey becomes physical burden for the rest of the episode." },
  { id: 24, cat: "PILOT — LOCKED", text: "TRAM SCENE: Boards ranting, exits mid-sentence, forgets to check out. OV-chipkaart silently deducts. He doesn't notice. We do. First invisible money loss." },
  { id: 301, cat: "PILOT — LOCKED", text: "THE WALKING ODYSSEY: There is no plot-device delay at the pickup point. The weather is nice, the viewer count is slightly up, and the chat says \"show us some dam bro.\" Edoardo CHOOSES to walk. The tram kept him distant and complainy; walking physically exposes him to the ghosts of his past and immediate temptations." },
  { id: 302, cat: "PILOT — LOCKED", text: "THE SMILING GHOST: Edoardo's job history is a graveyard of places he lasted a maximum of 14 days (night receptionist, cafes). He was never dramatically fired in a blaze of Marxist glory. He simply called in sick, made excuses, smiled politely, and eventually ghosted them." },
  { id: 25, cat: "PILOT — LOCKED", text: "COFFEESHOPS: 5-6 stops. Each a 10-15 second RPG transition (FFT/Fire Emblem grid). Select coffeeshop → MOVE → sprite walks → cut to live action walking out with joint mid-sentence. Money indicator ticking." },
  { id: 304, cat: "PILOT — LOCKED", text: "FIDGET PROP (JOINT CONES): Nervous habit of playing with empty plastic pre-roll cone tubes. Buys a 3-for-20 tourist deal and accumulates the empty tubes throughout the stream. Physical prop that tracks the passage of time and consumption." },
  { id: 305, cat: "PILOT — LOCKED", text: "FREDDY KRUEGER SURRENDER: Wears a horizontally striped sweater he believes channels Syd Barrett. Chat immediately calls it Freddy Krueger. Pissed at first. By the third joint, surrenders to the bit — slides three empty plastic cones onto his fingers like claws and plays the character to the chat." },
  { id: 26, cat: "PILOT — LOCKED", text: "PAOLO STORY: Smartshop in a former church. Paolo (formerly Guido). Counted candy stores: 1, 2, 3, 4, 5, 6 — decided Western civilisation was finished. Now in Albanian monastery. Revelation 18:11. Edoardo: \"He is so coherent.\"" },
  { id: 202, cat: "PILOT — LOCKED", text: "MOTHER JOINS CHAT (~150 VIEWERS): She appears under her FULL LEGAL NAME. Not a username. Her actual name. She treats the stream chat like a messaging app — types like she's sending a private WhatsApp. \"Edoardo did you eat today?\" The chat can see everything. She has no concept of public vs private digital space." },
  { id: 309, cat: "PILOT — LOCKED", text: "MAMMA CUMITINI: His mother joins the chat under her REAL NAME before the massive flood. Treats Twitch like WhatsApp. The Lore-Keepers use Google Translate to secretly interview her about Edoardo's past (locking himself out in pajamas for a pizza). She stays in the chat until the very end." },
  { id: 203, cat: "PILOT — LOCKED", text: "LORE KEEPERS INTERROGATE MOTHER: The two archivist regulars immediately start questioning her via auto-translation about past incidents Edoardo has described differently on stream. They are fact-checking him THROUGH HIS OWN MOTHER. She is a primary source who doesn't know she's being cross-referenced. Edoardo is being peer-reviewed live by his parent and his audience simultaneously." },
  { id: 401, cat: "PILOT — LOCKED", text: "LORE KEEPERS VS MOM — TRANSLATION ERRORS: Google Translate interrogation about \"pyjama-pizza-Debord incident.\" Translation errors create secondary myths in the chat (\"clean the canal Edo\"). A parallel show happening in chat Edoardo can't see." },
  { id: 205, cat: "PILOT — LOCKED", text: "UNIVERSITY TOILET STOP: He goes to the university for a free toilet (budget logic). But the high + being back in the building where he studied loosens him. The location does the work — it unlocks personal anecdotes he wouldn't tell in other settings. The university is emotionally loaded space and the weed removes the filter." },
  { id: 206, cat: "PILOT — LOCKED", text: "PERSONAL ANECDOTES AT UNIVERSITY: Clubs he ran, showing up to class in women's clothes, canal pissing rituals with friends. This is Edoardo at his most genuinely entertaining — not performing analysis, just telling stories from his actual life. The chat responds to THIS version of him much more than the Žižek version. He doesn't notice the difference." },
  { id: 207, cat: "PILOT — LOCKED", text: "PURPLE SOCKS + SILVER BIRKENSTOCKS: First downward camera reveal. The phone tilts down and we see what he's actually wearing on his feet. Purple socks. Silver Birkenstocks. This is not a costume choice — this is just what he put on. The chat sees it. He doesn't know it's visible. The outfit has been there the entire stream but nobody saw until now." },
  { id: 306, cat: "PILOT — LOCKED", text: "SOCKS AND SANDALS REVEAL: At the university, telling stories about showing up to class in women's clothes and urinating in canals. Points camera down to prove he is currently wearing purple socks and silver Birkenstocks. Chat loses its mind. The reveal is incidental — he doesn't understand why it's funny." },
  { id: 27, cat: "PILOT — LOCKED", text: "BICYCLE CRASH: Ranting in bike lane. Dutch woman hits him. Both furious. She's right. Doesn't drop phone. Chat explodes. Someone clips it. Viewers start growing: 65→120→200→400→800." },
  { id: 29, cat: "PILOT — LOCKED", text: "KEES TIKKIE: €3.50. IRL friend appears in chat. \"Sorry bro, I didn't know your stream was successful like that.\" Edoardo loses it. Rant about Tikkies as philosophically violent." },
  { id: 204, cat: "PILOT — LOCKED", text: "€3.50 DONATION — \"KEES CAN SUCK A DICK\": A stranger donates exactly €3.50 — the EXACT amount of Kees's Tikkie — with the message \"kees can suck a dick.\" This is Edoardo's first experience of strangers PAYING MONEY to take his side. Someone he's never met validated his grievance with cash. This is the gateway drug. The menace era starts here. He's tasted it now." },
  { id: 303, cat: "PILOT — LOCKED", text: "ALBERT HEIJN BONUS CARD WALLET: Rant that discounts are an illusion created by artificial markups, cards insultingly accessible. Opens wallet to reveal one €10 note but dozens of blue AH Bonus cards. Flicks them at camera one by one: \"Every time I forget it at home, I get another and another and another.\"" },
  { id: 311, cat: "PILOT — LOCKED", text: "CONVERSION BY MATH: Anti-capitalist in college because it fit his milieu. While reminiscing about unmonetized campus clubs (with hundreds of followers), the international chat runs the math on his lost revenue. The sheer volume of global viewers pointing out missed profits triggers a 180-degree pivot." },
  { id: 208, cat: "PILOT — LOCKED", text: "INTERNATIONAL CHAT OUTNUMBERS HIS FRAMEWORK: As viewers grow into the thousands, the chat starts running the math on everything Edoardo describes — his rent, his spending, his non-monetised stream, his free rants. The collective intelligence of thousands of strangers with calculators outnumbers his theoretical framework by sheer volume. They see what he can't: the numbers don't work and never did." },
  { id: 312, cat: "PILOT — LOCKED", text: "THE REVELATION (EXACT WORDING): He does not realize he should have been a startup founder. He simply realizes: \"I could have monetized it all. I actually love money. I was a fool.\"" },
  { id: 209, cat: "PILOT — LOCKED", text: "LIVE CONVERSION: The chat's math triggers a real-time epiphany. He could have monetised all of it. He ACTUALLY loves money. He was a fool. This is not a gag — it's a genuine shift in self-perception happening on camera. The irony is that this sincere vulnerable moment IS the most monetisable content he's ever produced, and he still doesn't see that layer." },
  { id: 33, cat: "PILOT — LOCKED", text: "SPENDING SPREE: Commercial gallery. Every purchase justified from inside the afternoon's logic. Every purchase is content. Bags accumulate. Money → zero." },
  { id: 215, cat: "PILOT — LOCKED", text: "SPENDING MECHANIC = DAM, NOT DRIP: The spending is NOT a recurring gag. It's a slope. Money arrives (donations, the gateway drug), ONE payment triggers, then everything that was queued fires at MACHINE PACE simultaneously. A dam breaking, not a dripping tap. The comedy is the speed differential: Edoardo's spending is human-paced (one purchase at a time, each justified), but the automated billing system catches up all at once. Dutch financial infrastructure as comedy engine." },
  { id: 214, cat: "PILOT — LOCKED", text: "BILLS AS PUSH NOTIFICATIONS CHAT READS FIRST: Zorgverzekering. Belastingdienst. Huur. The bills arrive as push notifications on his phone while he's streaming. The chat sees them pop up on screen BEFORE Edoardo reads them. The audience knows he's broke before he does. Information asymmetry as comedy — thousands of people watching a man's financial life collapse in real time, reading his mail over his shoulder." },
  { id: 34, cat: "PILOT — LOCKED", text: "BILLS HIT: Zorgverzekering. Belastingdienst. Huur. All arrive while he's on live carrying bags." },
  { id: 30, cat: "PILOT — LOCKED", text: "LENOR SCENE: Edge of Red Light District. Empty window. TE HUUR. \"Don't you remember the video, chat? It's that girl.\" Chat overlay STAYS VISIBLE BUT EMPTY — the silence is a visual fact. Ren'Py Visual Novel. Simlish. Text boxes. Dialogue from 2021 film." },
  { id: 31, cat: "PILOT — LOCKED", text: "LENOR KEY LINE: \"Love died. My body cannot produce love anymore. It produces fantasy. I am a factory of fantasies, and you are the consumer.\" Intimacy route locked. Only Transaction route. Window = dark glass. TE HUUR." },
  { id: 406, cat: "PILOT — LOCKED", text: "LENOR + HERON SIMULTANEITY: Visual Novel plays. Simlish. Locked routes. Heron visible in background of the window scene. Two shows running simultaneously. Chat split between \"how is this possible\" and \"damn I need to call my mom.\"" },
  { id: 32, cat: "PILOT — LOCKED", text: "POST-LENOR SILENCE: Back to live footage. Standing in front of empty window. Doesn't say anything. Keeps walking. Chat doesn't push. For once, nobody types." },
  { id: 211, cat: "PILOT — LOCKED", text: "\"EAT THE BOOK\" THREAD: Seeded early by a €1 donation on the tram: someone dares him to eat a page. The thread recurs across the episode as an escalating dare — more donations pile on, the dollar amount climbing. It pays off when he SNAPS and actually eats a page. Dry mouth from the weed. 20,000 viewers. His mother watching in chat. The dare economy works because each individual donation is tiny but the accumulated pressure is enormous." },
  { id: 313, cat: "PILOT — LOCKED", text: "EATING THE BIBLIOGRAPHY: Early — €1 donation says \"eat the book then.\" Laughs it off. As stream peaks and Swarm takes over, TTS donations escalate the demand. Hyped on Sativa and clout, he snaps: \"Fuck you chat, you thought I wasn't gonna do it? Don't fucking try me.\" Rips out a page and eats it. Impossibly dry. His mother watches in the chat." },
  { id: 201, cat: "PILOT — LOCKED", text: "COTTONMOUTH / HYDRATION / PEE LOOP: A PHYSICAL CLOCK running across the episode. Gets high → cottonmouth → drinks constantly → needs to pee → finds spot → drinks again. Four stops total. The loop is a bodily engine that keeps forcing him into new locations and new trouble. Each pee stop is a scene transition driven by his bladder, not by plot." },
  { id: 217, cat: "PILOT — LOCKED", text: "COTTONMOUTH → PEE → SNIPER CAUSAL CHAIN: The hydration loop is not just a running gag — it's a causal engine. Gets high → cottonmouth → drinks → needs to pee → finds canal → sniper finds HIM at the canal because he's stationary and exposed. The bodily function creates the vulnerability that the sniper exploits. Every physical consequence chains into the next." },
  { id: 212, cat: "PILOT — LOCKED", text: "STREAM SNIPER AT CANAL PEE: During the fourth and final canal pee (hydration loop payoff), a stream sniper who physically tracked him says \"hello, police\" from off-camera. Edoardo turns — still urinating — and nearly flashes his own stream while simultaneously pissing on the sniper's shoes. Neither party knows what to do. The comedy is the MUTUAL paralysis: the sniper got what he wanted (proximity to the streamer) and immediately regrets it." },
  { id: 213, cat: "PILOT — LOCKED", text: "THREE-WAY COLLISION AT BRIDGE PEE: The gag operates across all three registers simultaneously. EDOARDO: turning mid-pee, caught between exposure and dignity. PHYSICAL WORLD: urine on shoes, a stranger who thought this would be funny now has wet feet. CHAT: they see the near-flash, they see the sniper, they caused this by making the stream popular enough to attract snipers. The chat is watching the consequences of its own influence materialise in physical space." },
  { id: 310, cat: "PILOT — LOCKED", text: "THE SWARM (DEGENERACY MULTIPLIER): As viewers scale to thousands, the intimacy dies. Edoardo can no longer read custom requests. Chat becomes a hostile, fast-moving wall of emotes, forcing him to \"go Hollywood\" and act like a circus animal to keep their attention. The village became a stadium." },
  { id: 400, cat: "PILOT — LOCKED", text: "CUSTOM RANT DEATH: User types \"do the ING rant Edo\" → buried under \"FREDDY FREDDY FREDDY\" in 0.5 seconds. Tries twice. Buried twice. Mechanical murder of intimacy. The village dies not with a bang but with a scroll." },
  { id: 407, cat: "PILOT — LOCKED", text: "THE SWARM ARRIVES: 30 bodies emerge from alleys. Circle the gate. He raises hand like a general. They rush the EMERGENCY EXIT, film him passing. Digital becomes physical. They use him as cover, steal his viewers, ghost immediately." },
  { id: 408, cat: "PILOT — LOCKED", text: "CONTENT LOCUSTS: \"Thanks for the content bro!\" \"Decline again for my TikTok?\" → disperse when he goes offline. Extract clip, leave husk. Proves IRL viewers are worse than chat because they can smell you." },
  { id: 39, cat: "PILOT — LOCKED", text: "RTS ENDING: Metro gate declined. Edoardo tries to COMMAND his chat viewers like RTS units — summon crowd, storm the gates. Genre shift: RPG → Visual Novel → RTS. One last delusion: he thinks he can direct reality like a game.", pinned: true },
  { id: 40, cat: "PILOT — LOCKED", text: "RTS ENDING pt2: For one second it ALMOST works — crowd energy builds, looks like they'll force through. Then: ONE tall serious Dutch metro lady appears. Does NOTHING. Just EXISTS with authority. Entire mob evaporates. Smash back through gates in retreat." },
  { id: 41, cat: "PILOT — LOCKED", text: "RTS ENDING pt3: Edoardo alone. No ticket. Getting fined. ALL ON STREAM. Highest viewer count = worst moment. Fine gives him reason to call mum for money." },
  { id: 216, cat: "PILOT — LOCKED", text: "METRO GATE WIDE SHOT — THE SHOW TAKES OVER: When the stream dies, the TV camera takes over for the first time. Wide shot. A man in a Freddy Krueger sweater with empty joint cones on his fingers, holding a partially eaten theory book, bags in both hands, shouting at a dead phone for his mother. This is the first moment the SHOW sees Edoardo from the outside — not through his stream, not through his self-image, but from across the station. The image the world actually sees." },
  { id: 314, cat: "PILOT — LOCKED", text: "METRO GATE FINAL STATE: Over-encumbered with bags, the heavy book, and the plastic claws. The UI and the chat strip away. Left shouting at his phone, begging his chat and his mother for an Uber, before the episode cuts to the Ep2 protagonist swiping through the gate." },
  { id: 409, cat: "PILOT — LOCKED", text: "FINAL IMAGE: Surrounded by 30 phones recording in 4K. Shouts \"Mamma\" at dead device. LED circle light. Heron watches from the platform edge. Zoo animal, not streamer. The distance collapsed into suffocation." },
  { id: 415, cat: "PILOT — LOCKED", text: "THE ENDING (LOCKED): \"Mamma\" at dead phone. 30 LED screens. Heron. Gate beeps. Woman from Ep2 swipes through. Camera follows her. The joke: he asked 20,000 for an Uber. Got 30 filming him fail. Shouts to mom in a chat she's lost in. The show leaves his broadcast, sees him from outside for the first time: just a guy with bags, cones, swollen book, shouting at glass." },
  { id: 42, cat: "PILOT — LOCKED", text: "BATON PASS: Woman sidestepping active chaos — not passing a still figure, making ACTIVE CHOICE to not get involved. Most Dutch possible. Camera follows her instead." },
  { id: 410, cat: "PILOT — LOCKED", text: "MONEY INDICATOR THREAD: Chat sees it tick down. Edoardo doesn't. Regulars scream \"STOP\" → buried under \"DO IT.\" The number is always visible to everyone except the person it belongs to." },
  { id: 411, cat: "PILOT — LOCKED", text: "MOM TTS OPERA: €1 donations trigger her messages in TTS. Guanyin voice. Divine maternal intervention interrupting the menace era at the worst moments. She doesn't know she's being weaponised by strangers paying €1 to deploy her." },
  { id: 412, cat: "PILOT — LOCKED", text: "NINE-DAY JOBS THREAD: Hotel is the only real scene. The rest are chat callouts he denies. Lore-Keepers list the places: \"wasn't that the cafe on Kinkerstraat?\" \"no that was the one on Overtoom, he lasted THREE days there.\" Pattern, not wound." },
  { id: 413, cat: "PILOT — LOCKED", text: "JOINT CONES AS INVENTORY: Accumulate in pockets → move to fingers. Inventory management as character development. By the climax he has three on each hand. The Freddy Krueger bit is not a costume choice — it's the natural endpoint of consumption." },

function App() {
  const [ideas, setIdeas] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const d = JSON.parse(s); if (Array.isArray(d.ideas)) return d.ideas; } } catch {}
    return INITIAL_IDEAS;
  });
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");
  const [editCat, setEditCat] = useState("");
  const [newText, setNewText] = useState("");
  const [newCat, setNewCat] = useState("PILOT — PROPOSED");
  const [toast, setToast] = useState(null);
  const [deleted, setDeleted] = useState(null);
  const listRef = useRef(null);
  const inputRef = useRef(null);
  const editRef = useRef(null);

  // Autosave (only ideas — positions managed by desktop)
  useEffect(() => {
    const t = setTimeout(() => {
      try {
        const existing = localStorage.getItem(STORAGE_KEY);
        if (existing) {
          const d = JSON.parse(existing);
          d.ideas = ideas;
          d.savedAt = new Date().toISOString();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        } else {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ ideas, positions: {}, zIndices: {}, zoom: 0.52, pan: { x: 0, y: 0 }, savedAt: new Date().toISOString() }));
        }
      } catch {}
    }, 400);
    return () => clearTimeout(t);
  }, [ideas]);

  const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);

  const sl = search.toLowerCase();
  const filtered = useMemo(() => {
    return ideas.filter(i => {
      if (filter !== "ALL" && i.cat !== filter) return false;
      if (search && !i.text.toLowerCase().includes(sl) && !i.cat.toLowerCase().includes(sl)) return false;
      return true;
    });
  }, [ideas, filter, search, sl]);

  const counts = useMemo(() => {
    const c = {};
    for (const i of ideas) c[i.cat] = (c[i.cat] || 0) + 1;
    return c;
  }, [ideas]);

  const addNote = useCallback(() => {
    if (!newText.trim()) return;
    const id = Date.now();
    setIdeas(p => [...p, { id, cat: newCat, text: newText.trim(), pinned: false }]);
    setNewText("");
    setAdding(false);
    showToast("Note added ✓");
  }, [newText, newCat, showToast]);

  const deleteNote = useCallback((id) => {
    const note = ideas.find(i => i.id === id);
    setDeleted(note);
    setIdeas(p => p.filter(i => i.id !== id));
    setExpanded(null);
    showToast("Deleted — tap UNDO");
    setTimeout(() => setDeleted(null), 5000);
  }, [ideas, showToast]);

  const undoDelete = useCallback(() => {
    if (deleted) { setIdeas(p => [...p, deleted]); setDeleted(null); showToast("Restored ✓"); }
  }, [deleted, showToast]);

  const startEdit = useCallback((idea) => {
    setEditing(idea.id);
    setEditText(idea.text);
    setEditCat(idea.cat);
    setTimeout(() => editRef.current && editRef.current.focus(), 100);
  }, []);

  const saveEdit = useCallback(() => {
    if (!editing) return;
    setIdeas(p => p.map(i => i.id === editing ? { ...i, text: editText.trim() || i.text, cat: editCat } : i));
    setEditing(null);
    setExpanded(null);
    showToast("Saved ✓");
  }, [editing, editText, editCat, showToast]);

  const togglePin = useCallback((id) => {
    setIdeas(p => p.map(i => i.id === id ? { ...i, pinned: !i.pinned } : i));
    showToast("Pin toggled");
  }, [showToast]);

  const moveNote = useCallback((id, dir) => {
    setIdeas(p => {
      const idx = p.findIndex(i => i.id === id);
      if (idx < 0) return p;
      const target = dir === "up" ? idx - 1 : idx + 1;
      if (target < 0 || target >= p.length) return p;
      const arr = [...p];
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  }, []);

  useEffect(() => { if (adding && inputRef.current) setTimeout(() => inputRef.current.focus(), 100); }, [adding]);

  const pinnedCount = useMemo(() => filtered.filter(i => i.pinned).length, [filtered]);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#0a0a2e" }}>
      {/* HEADER */}
      <div style={{ padding: "12px 16px 8px", background: "linear-gradient(180deg,#0a0a2e,rgba(10,10,46,0.95))", borderBottom: "1px solid rgba(0,255,238,0.15)", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ color: "#0ff5ee", fontWeight: 700, fontSize: 15, letterSpacing: "0.1em" }}>💀 DCB MOBILE</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setAdding(!adding)} style={{ background: adding ? "#ff6ec7" : "rgba(0,255,238,0.15)", border: "none", borderRadius: 20, color: adding ? "#1a0020" : "#0ff5ee", padding: "6px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{adding ? "✕" : "+ ADD"}</button>
          </div>
        </div>
        {/* SEARCH */}
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search notes..." style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(0,255,238,0.15)", borderRadius: 8, color: "#fff", padding: "10px 14px", fontSize: 14, outline: "none", marginBottom: 10 }} />
        {/* CATEGORY TABS */}
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, WebkitOverflowScrolling: "touch" }}>
          <button onClick={() => setFilter("ALL")} style={{ flexShrink: 0, background: filter === "ALL" ? "rgba(0,255,238,0.2)" : "rgba(255,255,255,0.05)", border: filter === "ALL" ? "1px solid #0ff5ee" : "1px solid rgba(255,255,255,0.1)", borderRadius: 16, color: filter === "ALL" ? "#0ff5ee" : "rgba(255,255,255,0.5)", padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>ALL {ideas.length}</button>
          {CAT_KEYS.map(cat => {
            const cnt = counts[cat] || 0;
            if (!cnt) return null;
            const active = filter === cat;
            const co = COLORS[CATEGORIES[cat].color];
            return <button key={cat} onClick={() => setFilter(active ? "ALL" : cat)} style={{ flexShrink: 0, background: active ? co.bg + "33" : "rgba(255,255,255,0.05)", border: active ? `1px solid ${co.bg}` : "1px solid rgba(255,255,255,0.1)", borderRadius: 16, color: active ? co.bg : "rgba(255,255,255,0.5)", padding: "5px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>{CATEGORIES[cat].icon} {SHORT_NAMES[cat]} {cnt}</button>;
          })}
        </div>
      </div>

      {/* ADD PANEL */}
      {adding && (
        <div style={{ padding: "12px 16px", background: "rgba(255,110,199,0.08)", borderBottom: "1px solid rgba(255,110,199,0.2)", flexShrink: 0 }}>
          <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,110,199,0.2)", borderRadius: 8, color: "#fff", padding: "8px 12px", fontSize: 13, marginBottom: 8, outline: "none" }}>
            {CAT_KEYS.map(c => <option key={c} value={c}>{CATEGORIES[c].icon} {c}</option>)}
          </select>
          <textarea ref={inputRef} value={newText} onChange={e => setNewText(e.target.value)} placeholder="Fire away..." rows={3} style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,110,199,0.2)", borderRadius: 8, color: "#fff", padding: "10px 12px", fontSize: 14, outline: "none", resize: "none", lineHeight: 1.5 }} />
          <button onClick={addNote} disabled={!newText.trim()} style={{ width: "100%", marginTop: 8, background: newText.trim() ? "#ff6ec7" : "rgba(255,255,255,0.1)", border: "none", borderRadius: 8, color: newText.trim() ? "#1a0020" : "rgba(255,255,255,0.3)", padding: "12px", fontSize: 14, fontWeight: 700, cursor: newText.trim() ? "pointer" : "default" }}>ADD NOTE</button>
        </div>
      )}

      {/* COUNT BAR */}
      <div style={{ padding: "6px 16px", fontSize: 11, color: "rgba(255,255,255,0.35)", borderBottom: "1px solid rgba(255,255,255,0.05)", flexShrink: 0 }}>
        {filtered.length} notes{search ? ` matching "${search}"` : ""}{pinnedCount ? ` · ${pinnedCount} pinned` : ""}
      </div>

      {/* NOTE LIST */}
      <div ref={listRef} style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "8px 12px 80px" }}>
        {filtered.map(idea => {
          const cat = CATEGORIES[idea.cat] || { color: "yellow", icon: "📝" };
          const co = COLORS[cat.color];
          const isOpen = expanded === idea.id;
          return (
            <div key={idea.id} onClick={() => setExpanded(isOpen ? null : idea.id)} style={{
              background: co.bg, color: co.text, borderLeft: `4px solid ${co.border}`,
              borderRadius: 4, padding: isOpen ? "14px 14px 10px" : "10px 14px",
              marginBottom: 8, cursor: "pointer", transition: "all 0.15s ease",
              boxShadow: isOpen ? `0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px ${co.border}` : "0 1px 4px rgba(0,0,0,0.15)",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", opacity: 0.6 }}>{cat.icon} {SHORT_NAMES[idea.cat] || idea.cat}</span>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  {idea.pinned && <span style={{ fontSize: 11 }}>📌</span>}
                  <span style={{ fontSize: 10, opacity: 0.4 }}>{isOpen ? "▲" : "▼"}</span>
                </div>
              </div>
              {isOpen && editing === idea.id ? (
                <div onClick={e => e.stopPropagation()} style={{ marginTop: 4 }}>
                  <select value={editCat} onChange={e => setEditCat(e.target.value)} style={{ width: "100%", background: "rgba(0,0,0,0.1)", border: "1px solid rgba(0,0,0,0.2)", borderRadius: 6, color: co.text, padding: "8px 10px", fontSize: 12, marginBottom: 6, outline: "none" }}>
                    {CAT_KEYS.map(c => <option key={c} value={c}>{CATEGORIES[c].icon} {c}</option>)}
                  </select>
                  <textarea ref={editRef} value={editText} onChange={e => setEditText(e.target.value)} rows={5} style={{ width: "100%", background: "rgba(0,0,0,0.08)", border: "1px solid rgba(0,0,0,0.2)", borderRadius: 6, color: co.text, padding: "10px 12px", fontSize: 13, lineHeight: 1.5, outline: "none", resize: "vertical" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <button onClick={saveEdit} style={{ flex: 1, background: "rgba(0,0,0,0.2)", border: "none", borderRadius: 6, color: co.text, padding: "10px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✓ SAVE</button>
                    <button onClick={() => setEditing(null)} style={{ flex: 1, background: "rgba(0,0,0,0.08)", border: "none", borderRadius: 6, color: co.text, padding: "10px", fontSize: 13, cursor: "pointer", opacity: 0.7 }}>CANCEL</button>
                  </div>
                </div>
              ) : (
                <div style={{
                  fontSize: 13, lineHeight: 1.5,
                  overflow: isOpen ? "visible" : "hidden",
                  display: isOpen ? "block" : "-webkit-box",
                  WebkitLineClamp: isOpen ? "unset" : 2,
                  WebkitBoxOrient: "vertical",
                }}>{idea.text}</div>
              )}
              {isOpen && editing !== idea.id && (
                <div style={{ marginTop: 10 }}>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <button onClick={e => { e.stopPropagation(); startEdit(idea); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "7px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>✏️ EDIT</button>
                    <button onClick={e => { e.stopPropagation(); togglePin(idea.id); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "7px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{idea.pinned ? "📌 UNPIN" : "📌 PIN"}</button>
                    <button onClick={e => { e.stopPropagation(); moveNote(idea.id, "up"); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "7px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>⬆️</button>
                    <button onClick={e => { e.stopPropagation(); moveNote(idea.id, "down"); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "7px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>⬇️</button>
                    <button onClick={e => { e.stopPropagation(); navigator.clipboard.writeText(idea.text).then(() => showToast("Copied!")); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "7px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", opacity: 0.7 }}>📋 COPY</button>
                    <button onClick={e => { e.stopPropagation(); deleteNote(idea.id); }} style={{ background: "rgba(255,50,50,0.15)", border: "none", borderRadius: 4, color: "#cc0000", padding: "7px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>🗑 DELETE</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.25)", fontSize: 14 }}>No notes found</div>
        )}
      </div>

      {/* TOAST */}
      {(toast || deleted) && (
        <div style={{ position: "fixed", bottom: 20, left: 16, right: 16, background: "rgba(10,10,46,0.95)", border: "1px solid rgba(0,255,238,0.3)", borderRadius: 10, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", zIndex: 9999, backdropFilter: "blur(10px)" }}>
          <span style={{ fontSize: 13, color: "#fff" }}>{toast}</span>
          {deleted && <button onClick={undoDelete} style={{ background: "none", border: "1px solid #0ff5ee", borderRadius: 4, color: "#0ff5ee", padding: "4px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>UNDO</button>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
