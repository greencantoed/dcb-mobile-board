  { id: 9, cat: "SERIES", text: "Tone: comedy register is mo lei tau \u2014 dead serious commitment to absurd premises, no winking. Combined with Italian humiliation economics and manzai boke/tsukkomi." },
  { id: 4, cat: "SERIES", text: "\"Describe the room, not the wallpaper.\" Specific character behaviour under pressure, not abstract statements about late capitalism." },

  { id: 300, cat: "COMEDY RULES", text: "MO LEI TAU AS ENGINE: The comedy operates on hyper-specific absurdism and the mundane accumulation of chaos. It is not dark, dramatic, or melancholic. It is a picaresque stream where the surrealism is accepted as reality." },

  { id: 203, cat: "PILOT \u2014 LOCKED", text: "LORE KEEPERS INTERROGATE MOTHER: Fact-checking him THROUGH HIS OWN MOTHER via auto-translation. She's a primary source being cross-referenced." },

  { id: 30, cat: "PILOT \u2014 LOCKED", text: "LENOR SCENE: Edge of Red Light District. Empty window. TE HUUR. Chat overlay STAYS VISIBLE BUT EMPTY. Ren'Py Visual Novel. Simlish." },
  { id: 31, cat: "PILOT \u2014 LOCKED", text: "LENOR KEY LINE: \"Love died. My body cannot produce love anymore. It produces fantasy. I am a factory of fantasies, and you are the consumer.\"" },
  { id: 32, cat: "PILOT \u2014 LOCKED", text: "POST-LENOR SILENCE: Standing in front of empty window. Doesn't say anything. Chat doesn't push. For once, nobody types." },
  { id: 211, cat: "PILOT \u2014 LOCKED", text: "\"EAT THE BOOK\" THREAD: \u20AC1 dare on tram. Escalates. He SNAPS and eats a page. Dry mouth from weed. 20,000 viewers. Mother watching." },
  { id: 201, cat: "PILOT \u2014 LOCKED", text: "HYDRATION/PEE LOOP: Gets high \u2192 cottonmouth \u2192 drinks \u2192 needs to pee \u2192 finds spot. Four stops total. Bodily engine." },
  { id: 212, cat: "PILOT \u2014 LOCKED", text: "STREAM SNIPER AT CANAL PEE: \"hello, police.\" Turns mid-pee. Pisses on sniper's shoes. MUTUAL paralysis." },
  { id: 310, cat: "PILOT \u2014 LOCKED", text: "THE SWARM: Viewers scale to thousands. Intimacy dies. Chat = hostile wall of emotes. Village became stadium." },
  { id: 400, cat: "PILOT \u2014 LOCKED", text: "CUSTOM RANT DEATH: \"do the ING rant Edo\" buried under \"FREDDY FREDDY FREDDY\" in 0.5s. Mechanical murder of intimacy." },
  { id: 407, cat: "PILOT \u2014 LOCKED", text: "THE SWARM ARRIVES: 30 bodies from alleys. Rush EMERGENCY EXIT, film him passing. Ghost immediately." },
  { id: 408, cat: "PILOT \u2014 LOCKED", text: "CONTENT LOCUSTS: \"Thanks for the content bro!\" \"Decline again for my TikTok?\" Extract clip, leave husk." },

  { id: 40, cat: "PILOT \u2014 LOCKED", text: "RTS pt2: Almost works. ONE Dutch metro lady appears. Does NOTHING. Just EXISTS. Mob evaporates." },
  { id: 41, cat: "PILOT \u2014 LOCKED", text: "RTS pt3: Alone. Fined. ALL ON STREAM. Highest viewer count = worst moment." },

  { id: 415, cat: "PILOT \u2014 LOCKED", text: "THE ENDING: \"Mamma\" at dead phone. 30 LED screens. Heron. Gate beeps. Woman from Ep2 swipes through. Camera follows her." },

function App() {
  const [ideas, setIdeas] = useState(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const d = JSON.parse(s); if (Array.isArray(d.ideas)) return d.ideas; } } catch {}
    return INITIAL_IDEAS;
  });
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [adding, setAdding] = useState(false);
  const [newText, setNewText] = useState("");
  const [newCat, setNewCat] = useState("PILOT \u2014 PROPOSED");
  const [toast, setToast] = useState(null);
  const [deleted, setDeleted] = useState(null);
  const listRef = useRef(null);
  const inputRef = useRef(null);

  // Autosave (only ideas — positions managed by desktop)
  useEffect(() => {
    const t = setTimeout(() => {
      try {
        const existing = localStorage.getItem(STORAGE_KEY);
        if (existing) {
          const d = JSON.parse(existing);
          d.ideas = ideas;
          d.savedAt = new Date().toISOString();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        } else {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ ideas, positions: {}, zIndices: {}, zoom: 0.52, pan: { x: 0, y: 0 }, savedAt: new Date().toISOString() }));
        }
      } catch {}
    }, 400);
    return () => clearTimeout(t);
  }, [ideas]);

  const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);

  const sl = search.toLowerCase();
  const filtered = useMemo(() => {
    return ideas.filter(i => {
      if (filter !== "ALL" && i.cat !== filter) return false;
      if (search && !i.text.toLowerCase().includes(sl) && !i.cat.toLowerCase().includes(sl)) return false;
      return true;
    });
  }, [ideas, filter, search, sl]);

  const counts = useMemo(() => {
    const c = {};
    for (const i of ideas) c[i.cat] = (c[i.cat] || 0) + 1;
    return c;
  }, [ideas]);

  const addNote = useCallback(() => {
    if (!newText.trim()) return;
    const id = Date.now();
    setIdeas(p => [...p, { id, cat: newCat, text: newText.trim(), pinned: false }]);
    setNewText("");
    setAdding(false);
    showToast("Note added \u2713");
  }, [newText, newCat, showToast]);

  const deleteNote = useCallback((id) => {
    const note = ideas.find(i => i.id === id);
    setDeleted(note);
    setIdeas(p => p.filter(i => i.id !== id));
    setExpanded(null);
    showToast("Deleted \u2014 tap UNDO");
    setTimeout(() => setDeleted(null), 5000);
  }, [ideas, showToast]);

  const undoDelete = useCallback(() => {
    if (deleted) { setIdeas(p => [...p, deleted]); setDeleted(null); showToast("Restored \u2713"); }
  }, [deleted, showToast]);

  useEffect(() => { if (adding && inputRef.current) setTimeout(() => inputRef.current.focus(), 100); }, [adding]);

  const pinnedCount = useMemo(() => filtered.filter(i => i.pinned).length, [filtered]);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "#0a0a2e" }}>
      {/* HEADER */}
      <div style={{ padding: "12px 16px 8px", background: "linear-gradient(180deg,#0a0a2e,rgba(10,10,46,0.95))", borderBottom: "1px solid rgba(0,255,238,0.15)", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ color: "#0ff5ee", fontWeight: 700, fontSize: 15, letterSpacing: "0.1em" }}>\u{1F480} DCB MOBILE</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setAdding(!adding)} style={{ background: adding ? "#ff6ec7" : "rgba(0,255,238,0.15)", border: "none", borderRadius: 20, color: adding ? "#1a0020" : "#0ff5ee", padding: "6px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{adding ? "\u2715" : "+ ADD"}</button>
          </div>
        </div>
        {/* SEARCH */}
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="\u{1F50D} Search notes..." style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(0,255,238,0.15)", borderRadius: 8, color: "#fff", padding: "10px 14px", fontSize: 14, outline: "none", marginBottom: 10 }} />
        {/* CATEGORY TABS */}
        <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, WebkitOverflowScrolling: "touch" }}>
          <button onClick={() => setFilter("ALL")} style={{ flexShrink: 0, background: filter === "ALL" ? "rgba(0,255,238,0.2)" : "rgba(255,255,255,0.05)", border: filter === "ALL" ? "1px solid #0ff5ee" : "1px solid rgba(255,255,255,0.1)", borderRadius: 16, color: filter === "ALL" ? "#0ff5ee" : "rgba(255,255,255,0.5)", padding: "5px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>ALL {ideas.length}</button>
          {CAT_KEYS.map(cat => {
            const cnt = counts[cat] || 0;
            if (!cnt) return null;
            const active = filter === cat;
            const co = COLORS[CATEGORIES[cat].color];
            return <button key={cat} onClick={() => setFilter(active ? "ALL" : cat)} style={{ flexShrink: 0, background: active ? co.bg + "33" : "rgba(255,255,255,0.05)", border: active ? `1px solid ${co.bg}` : "1px solid rgba(255,255,255,0.1)", borderRadius: 16, color: active ? co.bg : "rgba(255,255,255,0.5)", padding: "5px 10px", fontSize: 11, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>{CATEGORIES[cat].icon} {SHORT_NAMES[cat]} {cnt}</button>;
          })}
        </div>
      </div>

      {/* ADD PANEL */}
      {adding && (
        <div style={{ padding: "12px 16px", background: "rgba(255,110,199,0.08)", borderBottom: "1px solid rgba(255,110,199,0.2)", flexShrink: 0 }}>
          <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,110,199,0.2)", borderRadius: 8, color: "#fff", padding: "8px 12px", fontSize: 13, marginBottom: 8, outline: "none" }}>
            {CAT_KEYS.map(c => <option key={c} value={c}>{CATEGORIES[c].icon} {c}</option>)}
          </select>
          <textarea ref={inputRef} value={newText} onChange={e => setNewText(e.target.value)} placeholder="Fire away..." rows={3} style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,110,199,0.2)", borderRadius: 8, color: "#fff", padding: "10px 12px", fontSize: 14, outline: "none", resize: "none", lineHeight: 1.5 }} />
          <button onClick={addNote} disabled={!newText.trim()} style={{ width: "100%", marginTop: 8, background: newText.trim() ? "#ff6ec7" : "rgba(255,255,255,0.1)", border: "none", borderRadius: 8, color: newText.trim() ? "#1a0020" : "rgba(255,255,255,0.3)", padding: "12px", fontSize: 14, fontWeight: 700, cursor: newText.trim() ? "pointer" : "default" }}>ADD NOTE</button>
        </div>
      )}

      {/* COUNT BAR */}
      <div style={{ padding: "6px 16px", fontSize: 11, color: "rgba(255,255,255,0.35)", borderBottom: "1px solid rgba(255,255,255,0.05)", flexShrink: 0 }}>
        {filtered.length} notes{search ? ` matching "${search}"` : ""}{pinnedCount ? ` \u00B7 ${pinnedCount} pinned` : ""}
      </div>

      {/* NOTE LIST */}
      <div ref={listRef} style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "8px 12px 80px" }}>
        {filtered.map(idea => {
          const cat = CATEGORIES[idea.cat] || { color: "yellow", icon: "\u{1F4DD}" };
          const co = COLORS[cat.color];
          const isOpen = expanded === idea.id;
          return (
            <div key={idea.id} onClick={() => setExpanded(isOpen ? null : idea.id)} style={{
              background: co.bg, color: co.text, borderLeft: `4px solid ${co.border}`,
              borderRadius: 4, padding: isOpen ? "14px 14px 10px" : "10px 14px",
              marginBottom: 8, cursor: "pointer", transition: "all 0.15s ease",
              boxShadow: isOpen ? `0 4px 20px rgba(0,0,0,0.3), 0 0 0 1px ${co.border}` : "0 1px 4px rgba(0,0,0,0.15)",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em", opacity: 0.6 }}>{cat.icon} {SHORT_NAMES[idea.cat] || idea.cat}</span>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  {idea.pinned && <span style={{ fontSize: 11 }}>\u{1F4CC}</span>}
                  <span style={{ fontSize: 10, opacity: 0.4 }}>{isOpen ? "\u25B2" : "\u25BC"}</span>
                </div>
              </div>
              <div style={{
                fontSize: 13, lineHeight: 1.5,
                overflow: isOpen ? "visible" : "hidden",
                display: isOpen ? "block" : "-webkit-box",
                WebkitLineClamp: isOpen ? "unset" : 2,
                WebkitBoxOrient: "vertical",
              }}>{idea.text}</div>
              {isOpen && (
                <div style={{ marginTop: 10, display: "flex", justifyContent: "flex-end", gap: 8 }}>
                  <button onClick={e => { e.stopPropagation(); navigator.clipboard.writeText(idea.text).then(() => showToast("Copied!")); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: co.text, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer", opacity: 0.7 }}>\u{1F4CB} COPY</button>
                  <button onClick={e => { e.stopPropagation(); deleteNote(idea.id); }} style={{ background: "rgba(0,0,0,0.1)", border: "none", borderRadius: 4, color: "#ff4444", padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>\u{1F5D1} DELETE</button>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "rgba(255,255,255,0.25)", fontSize: 14 }}>No notes found</div>
        )}
      </div>

      {/* TOAST */}
      {(toast || deleted) && (
        <div style={{ position: "fixed", bottom: 20, left: 16, right: 16, background: "rgba(10,10,46,0.95)", border: "1px solid rgba(0,255,238,0.3)", borderRadius: 10, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", zIndex: 9999, backdropFilter: "blur(10px)" }}>
          <span style={{ fontSize: 13, color: "#fff" }}>{toast}</span>
          {deleted && <button onClick={undoDelete} style={{ background: "none", border: "1px solid #0ff5ee", borderRadius: 4, color: "#0ff5ee", padding: "4px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>UNDO</button>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
